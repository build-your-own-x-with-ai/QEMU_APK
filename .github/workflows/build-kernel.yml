name: Build ARM32 Kernel for QEMU virt

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch to build'
        required: true
        default: 'android12-5.10'
      release_tag:
        description: 'Release tag for artifacts'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf \
            bc bison flex libssl-dev make cpio gzip

      - name: Checkout kernel source
        run: |
          git clone --depth=1 --branch=${{ inputs.kernel_branch }} \
            https://android.googlesource.com/kernel/common kernel
        timeout-minutes: 10

      - name: Apply config
        working-directory: kernel
        run: |
          # Start with multi_v7_defconfig (multiplatform ARMv7 with virtio/PCI/DRM)
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- multi_v7_defconfig

          # Append Android-specific configs
          cat >> .config << 'EOF'
          # Virtio devices
          CONFIG_VIRTIO=y
          CONFIG_VIRTIO_PCI=y
          CONFIG_VIRTIO_PCI_LEGACY=y
          CONFIG_VIRTIO_BLK=y
          CONFIG_VIRTIO_NET=y
          CONFIG_VIRTIO_MMIO=y
          CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y
          CONFIG_VIRTIO_CONSOLE=y
          CONFIG_VIRTIO_BALLOON=y
          CONFIG_VIRTIO_INPUT=y
          CONFIG_HW_RANDOM_VIRTIO=y

          # GPU / Display
          CONFIG_DRM=y
          CONFIG_DRM_VIRTIO_GPU=y
          CONFIG_FB=y
          CONFIG_FRAMEBUFFER_CONSOLE=y
          CONFIG_LOGO=y

          # Android-specific
          CONFIG_ANDROID=y
          CONFIG_ANDROID_BINDER_IPC=y
          CONFIG_ANDROID_BINDERFS=y
          CONFIG_ANDROID_LOGGER=y
          CONFIG_ASHMEM=y

          # DMA-BUF
          CONFIG_DMA_SHARED_BUFFER=y
          CONFIG_DMABUF_HEAPS=y
          CONFIG_DMABUF_HEAPS_SYSTEM=y
          CONFIG_DMABUF_HEAPS_CMA=y

          # Filesystems
          CONFIG_EXT4_FS=y
          CONFIG_EXT4_FS_POSIX_ACL=y
          CONFIG_EXT4_FS_SECURITY=y
          CONFIG_F2FS_FS=y
          CONFIG_TMPFS=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_DEVTMPFS=y
          CONFIG_DEVTMPFS_MOUNT=y

          # Networking
          CONFIG_NET=y
          CONFIG_INET=y
          CONFIG_IPV6=y
          CONFIG_NETFILTER=y
          CONFIG_NF_CONNTRACK=y
          CONFIG_BRIDGE=y
          CONFIG_NET_9P=y
          CONFIG_9P_FS=y

          # USB (for adb gadget)
          CONFIG_USB=y
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_CONFIGFS_F_ADB=y
          CONFIG_USB_GADGET=y

          # Misc
          CONFIG_BINFMT_ELF=y
          CONFIG_BINFMT_SCRIPT=y
          CONFIG_BLK_DEV_INITRD=y
          CONFIG_RD_GZIP=y
          CONFIG_NAMESPACES=y
          CONFIG_UTS_NS=y
          CONFIG_IPC_NS=y
          CONFIG_PID_NS=y
          CONFIG_NET_NS=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_FAIR_GROUP_SCHED=y
          CONFIG_IKCONFIG=y
          CONFIG_IKCONFIG_PROC=y
          CONFIG_PRINTK=y
          CONFIG_MAGIC_SYSRQ=y
          CONFIG_PANIC_TIMEOUT=-1
          EOF

          # Regenerate config to resolve dependencies
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- olddefconfig

      - name: Build kernel
        working-directory: kernel
        run: |
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j$(nproc) zImage
        timeout-minutes: 60

      - name: Build initramfs
        run: |
          # Create initramfs directory structure
          mkdir -p initramfs/{bin,sbin,dev,etc,lib,mnt/root,proc,sys,usr/bin,usr/sbin,var/tmp,root}

          # Download busybox-static for ARM32 from Alpine
          # The busybox-static package provides a self-contained static binary
          curl -fsSL "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/armhf/" | \
            grep -oP 'busybox-static-[0-9][^"]*' | head -1 > busybox_pkg.txt
          BUSYBOX_PKG=$(cat busybox_pkg.txt)
          echo "Downloading: $BUSYBOX_PKG"
          curl -fsSL "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/armhf/$BUSYBOX_PKG" \
            -o busybox.apk

          # Extract busybox from the .apk (it's a tar archive)
          tar xf busybox.apk -C initramfs/
          # busybox binary is at initramfs/bin/busybox
          chmod +x initramfs/bin/busybox

          # Create symlinks for all common applets
          cd initramfs/bin
          for applet in sh ash mount umount mkdir cp mv ls cat echo sleep \
            ifconfig udhcpc ip route switch_root find grep sed awk \
            chmod chown ln rm rmdir kill ps reboot poweroff hostname \
            date dmesg clear reset tty wc head tail tee touch; do
            ln -sf busybox "$applet" 2>/dev/null || true
          done
          cd ../..

          # Also link sbin utilities
          cd initramfs/sbin
          for applet in init halt poweroff reboot switch_root mkfs.ext4 \
            mount umount fdisk mdev; do
            ln -sf ../bin/busybox "$applet" 2>/dev/null || true
          done
          cd ../..

          # Create /init script
          cat > initramfs/init << 'INITEOF'
#!/bin/sh
# Init for QEMU ARM32 with virtio

# Mount essential filesystems
mount -t proc proc /proc
mount -t sysfs sysfs /sys
mount -t devtmpfs devtmpfs /dev

# Create essential device nodes
mkdir -p /dev/pts /dev/shm
mount -t devpts devpts /dev/pts
mount -t tmpfs tmpfs /dev/shm

# Wait for virtio block devices to appear
sleep 2

# Set up networking
echo "Setting up network..."
ifconfig lo 127.0.0.1 up
ifconfig eth0 up 2>/dev/null
udhcpc -i eth0 -t 5 2>/dev/null || true

echo ""
echo "===================================="
echo " QEMU ARM32 System Booted"
echo " Kernel: $(uname -r)"
echo " Arch: $(uname -m)"
echo "===================================="
echo ""

# Try to find and mount root filesystem from virtio-blk
ROOTDEV=""
for dev in /dev/vda /dev/vdb /dev/vdc; do
  if [ -b "$dev" ]; then
    ROOTDEV="$dev"
    break
  fi
done

if [ -n "$ROOTDEV" ]; then
  echo "Found block device: $ROOTDEV"
  mount -t ext4 "$ROOTDEV" /mnt/root 2>/dev/null || \
  mount -t f2fs "$ROOTDEV" /mnt/root 2>/dev/null || true

  if [ -f /mnt/root/sbin/init ] || [ -d /mnt/root/bin ]; then
    echo "Switching to real root at /mnt/root..."
    exec switch_root /mnt/root /sbin/init
  fi
  echo "Rootfs at $ROOTDEV (no init found, using initramfs shell)"
fi

# Drop to interactive shell
echo "Type 'help' for busybox commands."
exec /bin/sh
INITEOF
          chmod +x initramfs/init

          # Create /etc/fstab
          cat > initramfs/etc/fstab << 'FSTABEOF'
proc     /proc  proc     defaults  0  0
sysfs    /sys   sysfs    defaults  0  0
devtmpfs /dev   devtmpfs defaults  0  0
FSTABEOF

          # Pack initramfs
          cd initramfs && find . | cpio -H newc -o 2>/dev/null | gzip -9 > ../initrd
          cd ..
          ls -lh initrd
          echo "Initramfs size: $(du -sh initrd | cut -f1)"

      - name: Verify artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -lh kernel/arch/arm/boot/zImage
          ls -lh initrd
          file kernel/arch/arm/boot/zImage
          file initrd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arm32-kernel-initrd
          path: |
            kernel/arch/arm/boot/zImage
            initrd

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ARM32 Kernel ${{ inputs.release_tag }}
          files: |
            kernel/arch/arm/boot/zImage
            initrd
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
